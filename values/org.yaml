metadata:
  managed_values:
    - values/org.yaml
    - values/teams/academix.yaml
    - values/services/academix.yaml
  repo: k0renn/AcademiX
org:
  default_stack:
    auth: Clerk
    backend: Convex (serverless functions + database)
    frontend_framework: Next.js (App Router)
    language: TypeScript
    payments: Stripe
  governance_purpose: deterministic-instruction-rendering
  name: k0renn
  policy_defaults:
    cicd_baseline:
      - Build must pass TypeScript strict type-checking.
      - Lint must pass (next/core-web-vitals).
    dependency_baseline:
      - Prefer official vendor SDKs (Next.js, Convex, Clerk, Stripe).
      - Avoid introducing new auth/payment providers unless explicitly approved.
    responsibility_model:
      rules:
        - Existing code is intentional; do not assume missing logic.
        - Delegation to third-parties (Clerk/Convex/Stripe) implies non-ownership of those systems.
        - Only responsibilities evidenced by repo paths are considered owned.
    security_baseline:
      - Protect routes via Clerk middleware where applicable.
      - Never commit secrets; all secrets must be provided via environment variables.
      - Validate inputs on Convex functions using convex/values validators.
      - Verify webhook signatures for inbound webhooks (e.g., Stripe).
  source_of_truth:
    primary: DATA.repoScan
    secondary: DATA.teamContextData
  defaults:
    cicd:
      guidance:
        - 'CI should run: lint, typecheck, build (and tests when present).'
        - PR-based collaboration is required; keep changes small and reviewable.
    dependencies:
      allowed_sources:
        - Public npm registry packages
        - Official GitHub Actions (if/when CI exists)
        - Internal repositories (when explicitly referenced)
      guidance:
        - Prefer framework-native integrations (Next.js, Convex, Clerk) over bespoke infra.
        - Pin versions via lockfile; avoid unreviewed dependency additions.
    naming_formatting:
      - 'TypeScript/JavaScript: camelCase for functions/vars; PascalCase for React components/types.'
      - 'Filesystem: kebab-case or lowercase filenames; feature/module grouping under app/ and components/.'
      - Keep env vars in SCREAMING_SNAKE_CASE; never commit secrets.
    policies:
      base_policy: repo-scan-is-source-of-truth
      principles:
        - Existing code is intentional; do not invent missing logic.
        - Delegation to third-party services implies non-ownership of those responsibilities.
        - 'Security posture: medium; prefer least-privilege and validated inputs.'
    security:
      guidance:
        - Do not handle raw credentials; use managed identity providers (e.g., Clerk) and backend auth context.
        - Validate and bound untrusted inputs at the boundary (Convex validators, server checks).
        - Verify webhook signatures for external event ingestion.
    source_of_truth:
      primary: DATA.repoScan
      secondary: DATA.teamContextData
    base_policy: org-defaults
    engineering_practices:
      code_review_required: true
      collaboration_channels:
        - GitHub
        - GitHub Actions
    governance:
      delegation_implies_non_ownership: true
      deterministic_rendering: true
      missing_logic_prohibited: true
      repository_first: true
    security_baseline:
      dependency_sources_allowed:
        - Public npm registry packages
        - Official GitHub Actions
        - Internal repositories (where referenced)
      env_vars_required_for_secrets: true
      secrets_in_repo_prohibited: true
  governance_compilation: true
  metadata:
    deployment_model: cloud
    industry: SaaS / Developer Platform
    product: k0renn Platform
    company_description: A GitHub-hosted portfolio/org running multiple private product and experimentation repositories, primarily TypeScript/JavaScript web apps.
    primary_stack:
      languages:
        - TypeScript
        - JavaScript
        - CSS
      runtime:
        - Node.js
    repo_hosting: GitHub
    collaboration_channels:
      - name: GitHub
        purpose: code collaboration, reviews, change history
      - name: GitHub Actions
        purpose: CI feedback loops (if configured)
  platform: github
  schema_version: 1.0.0
  default_policies:
    base_policy: org-defaults
    change_scope:
      - Changes must remain within the repo’s evidenced boundaries (frameworks, integrations, and file structure).
      - Prefer minimal, incremental changes aligned to existing patterns.
    collaboration:
      channels:
        - GitHub
        - GitHub Actions (if configured)
      code_review_required: true
    dependency_baseline:
      - New dependencies require explicit justification and must be committed with lockfile updates.
      - Prefer existing libraries/patterns already used in the repository.
    security_baseline:
      - Never commit secrets; use environment variables.
      - Avoid expanding public access; enforce authentication/authorization at server boundaries.
  description: GitHub-hosted org running multiple TypeScript/JavaScript web applications and related tooling.
  repo_governance:
    inheritance_source: DATA.teamContextData
    primary_source_of_truth: DATA.repoScan
    rules:
      - Existing code is intentional.
      - 'Missing logic is a hard prohibition: do not invent architecture or responsibilities not evidenced in the repo.'
      - 'Delegation implies non-ownership: integrations (e.g., Clerk, Stripe, Convex) must not be re-implemented as first-party services.'
  governance:
    delegation_rules:
      - 'Delegation implies non-ownership: integrations (Clerk, Stripe, Convex) must not be re-implemented in-repo.'
      - 'Missing logic is prohibited: only implement capabilities evidenced in repo paths.'
    dependency_baselines:
      - New dependencies must be justified and lockfile updates must be committed.
      - 'Prefer existing stack: Next.js App Router, Convex, Clerk, Stripe, Radix/shadcn UI.'
    determinism:
      closed_set_canonical_service_types: true
      require_path_evidence: true
    scope_source_of_truth: DATA.repoScan
    security_baselines:
      - No secrets in repo; use environment variables only.
      - All inbound webhooks must be signature verified before state changes.
      - All state-changing backend operations must enforce authentication at the backend boundary.
  policy_id: org-defaults
  governance_mode: deterministic
additional_context: ""
defaults:
  base_policy: org-defaults
  repo_collaboration:
    code_review_required: true
    primary_channels:
      - GitHub
      - GitHub Actions
  security_baseline:
    dependency_sources_allowed:
      - Public npm registry packages
      - Official GitHub Actions
      - Internal repositories (where referenced)
    secrets_management:
      rules:
        - Never commit secrets; use environment variables
        - Do not log secrets
  tech_stack_expectations:
    languages:
      - TypeScript
      - JavaScript
      - CSS
    runtimes:
      - Node.js
policy_library:
  org-defaults:
    cicd:
      - Keep lint/build/typecheck passing
      - If workflows exist, require checks to pass before merge
    dependencies:
      - New dependencies must be justified and kept minimal
      - Update and commit lockfile when dependencies change
    general:
      - 'Repository-first governance: implement only what is evidenced in the repo'
      - Existing code is intentional; do not delete/replace patterns without evidence
      - Prefer small, reviewable changes
    intent: Org-wide baseline governance for repositories
    naming_formatting:
      - 'TypeScript/JavaScript: camelCase symbols; PascalCase components/types'
      - 'Filenames: kebab-case or lowercase for modules/assets'
      - Prefer consistent formatting compatible with common TS toolchains
    security:
      - Do not introduce credential storage or custom auth unless explicitly governed
      - Validate external inputs at service boundaries
