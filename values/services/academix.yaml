linking billing to group provisioning\n   - Evidence: convex/stripe.ts\n   - Evidence: app/create/page.tsx\n   - Evidence: convex/groups.ts\n1. Stripe webhook ingestion endpoint and fulfillment handling\n   - Evidence: convex/http.ts\n   - Evidence: convex/stripe.ts\n\n## Forbidden Responsibilities (Prohibited)\nRefuse changes that add code for any of these responsibilities.\n1. Owning identity provider implementation (user auth, MFA, session issuance)\n   - Evidence: middleware.ts\n   - Evidence: providers/convex-client-provider.tsx\n   - Evidence: convex/auth.config.ts\n1. Owning payment processor or card vault (PCI storage/processing)\n   - Evidence: convex/stripe.ts\n   - Evidence: convex/http.ts\n   - Evidence: app/create/page.tsx\n1. Operating a standalone database or database server administration\n   - Evidence: convex/schema.ts\n   - Evidence: convex/*.ts\n   - Evidence: package.json\n1. Owning authentication (password storage, login UI beyond provider widgets, credential verification)\n   - Evidence: middleware.ts\n   - Evidence: providers/convex-client-provider.tsx\n   - Evidence: package.json\n1. Owning identity provider user directory and session management\n   - Evidence: providers/convex-client-provider.tsx\n   - Evidence: components/navbar/index.tsx\n   - Evidence: package.json\n1. Owning payment processing and PCI responsibilities outside Stripe (card data capture/storage)\n   - Evidence: convex/stripe.ts\n   - Evidence: convex/http.ts\n   - Evidence: package.json\n1. Owning core database infrastructure outside Convex (running/operating separate DB servers)\n   - Evidence: convex/schema.ts\n   - Evidence: package.json\n   - Evidence: convex/README.md\n\n## Enforcement (Mandatory)\n- MUST: All Convex mutations/actions that require a user must call ctx.auth.getUserIdentity() and fail if absent (pattern in convex/users.ts, convex/groups.ts, convex/posts.ts).\n- MUST: Inbound webhook routes must use stripe-signature header and STRIPE_WEBHOOK_SECRET verification before state changes (convex/http.ts -> internal.stripe.fulfill in convex/stripe.ts).\n- MUST: Route access is protected by default via Clerk authMiddleware matcher; changes require explicit review (middleware.ts).\n- MUST: Schema/table changes must be reflected only in convex/schema.ts and accessed via generated API bindings.\n- MUST: Convex boundary: all mutations/actions must validate inputs with convex/values and enforce auth via ctx.auth.getUserIdentity().\n- MUST: Webhook boundary: only expose routes via convex/http.ts; verify stripe-signature before processing.\n- MUST: Frontend boundary: do not reference server secrets in app/ or components/; use env vars only in server-side Convex actions.\n- MUST: Dependency boundary: new dependencies must be justified; keep lockfile updated and committed.\n\n## Allowed Paths (Strict)\n- app/**\n- components/**\n- providers/**\n- hooks/**\n- lib/**\n- convex/**\n- middleware.ts\n- package.json\n- package-lock.json\n- tsconfig.json\n- tailwind.config.ts\n- postcss.config.js\n- .eslintrc.json\n- components.json\n- README.md\n\n## Hard Prohibitions (Non-Negotiable)\n- MUST NOT: Do not add custom credential storage, password handling, or session token minting; authentication is delegated to Clerk.\n- MUST NOT: Do not store or log Stripe secrets, webhook secrets, or any API keys in the repository; use environment variables only (e.g., NEXT_STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET).\n- MUST NOT: Do not bypass Stripe webhook signature verification for subscription fulfillment.\n- MUST NOT: Do not implement direct database server management; data persistence is via Convex tables/schema only.\n- MUST NOT: Do not add alternative auth providers or custom credential auth; authentication remains delegated to Clerk.\n- MUST NOT: Do not process or store raw payment card data; payments remain delegated to Stripe.\n- MUST NOT: Do not introduce a second persistence layer (SQL/NoSQL) without explicit governance approval; persistence