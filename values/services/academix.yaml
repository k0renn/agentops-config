allowed_paths:
  - app/**
  - components/**
  - providers/**
  - hooks/**
  - lib/**
  - convex/**
  - middleware.ts
  - package.json
  - package-lock.json
  - tsconfig.json
  - tailwind.config.ts
  - postcss.config.js
  - .eslintrc.json
  - components.json
  - README.md
canonical_service_type:
  chosen: Backend-for-Frontend (BFF)
enforcement:
  - All Convex mutations/actions that require a user must call ctx.auth.getUserIdentity() and fail if absent (see convex/users.ts, convex/groups.ts, convex/posts.ts).
  - Inbound webhook routes must use stripe-signature header and STRIPE_WEBHOOK_SECRET verification before state changes (convex/http.ts -> internal.stripe.fulfill in convex/stripe.ts).
  - Route access is protected by default via Clerk authMiddleware matcher; changes require explicit review (middleware.ts).
  - Schema/table changes must be reflected only in convex/schema.ts and accessed via generated API bindings (@/convex/_generated/api).
  - 'Convex boundary: all mutations/actions must validate inputs with convex/values and enforce auth via ctx.auth.getUserIdentity().'
  - 'Webhook boundary: only expose routes via convex/http.ts; verify stripe-signature before processing.'
  - 'Frontend boundary: do not reference server secrets in app/ or components/; use env vars only in server-side Convex actions.'
  - 'Dependency boundary: new dependencies must be justified; keep lockfile updated and committed.'
forbidden_responsibilities:
  - evidence:
      - middleware.ts
      - providers/convex-client-provider.tsx
      - convex/auth.config.ts
    title: Owning identity provider implementation (user auth, MFA, session issuance)
  - evidence:
      - middleware.ts
      - providers/convex-client-provider.tsx
      - package.json
    title: Owning authentication credentials (password storage, credential verification, custom session token minting)
  - evidence:
      - convex/stripe.ts
      - convex/http.ts
      - package.json
    title: Owning payment processor / card vault (PCI storage/processing)
  - evidence:
      - convex/schema.ts
      - convex/README.md
      - package.json
    title: Operating a standalone database or database server administration outside Convex
hard_prohibitions:
  - Do not add custom credential storage, password handling, or session token minting; authentication is delegated to Clerk.
  - Do not store or log Stripe secrets, webhook secrets, or any API keys in the repository; use environment variables only (e.g., NEXT_STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET).
  - Do not bypass Stripe webhook signature verification for subscription fulfillment.
  - Do not implement direct database server management; data persistence is via Convex tables/schema only.
  - Do not add alternative auth providers or custom credential auth; authentication remains delegated to Clerk.
  - Do not process or store raw payment card data; payments remain delegated to Stripe.
  - Do not introduce a second persistence layer (SQL/NoSQL) without explicit governance approval; persistence remains in Convex tables.
  - Do not add unauthenticated state-changing Convex mutations/actions; all writes require ctx.auth.getUserIdentity().
  - Do not accept external webhooks without signature verification and strict parsing/bounds.
owned_responsibilities:
  - evidence:
      - app/layout.tsx
      - app/(homepage)/page.tsx
      - app/[groupId]/page.tsx
    title: Next.js application routing, layouts, and UI rendering (App Router)
  - evidence:
      - convex/schema.ts
      - convex/groups.ts
      - convex/posts.ts
    title: Backend data model and business operations via Convex queries/mutations (domain persistence)
  - evidence:
      - middleware.ts
      - providers/convex-client-provider.tsx
      - convex/auth.config.ts
    title: Authentication integration and route protection using Clerk
  - evidence:
      - convex/stripe.ts
      - convex/http.ts
      - app/create/page.tsx
    title: Subscription checkout initiation and Stripe webhook fulfillment handling
  - evidence:
      - hooks/use-api-mutation.ts
      - app/(homepage)/page.tsx
      - app/[groupId]/page.tsx
    title: BFF data access orchestration via Convex client hooks (queries/mutations/actions)
  - evidence:
      - convex/users.ts
      - convex/comments.ts
      - convex/groups.ts
    title: Identity-aware access checks at backend boundary using Convex auth context
service:
  id: k0renn/AcademiX
  source_of_truth: DATA.repoScan
team:
  base_policy: org-defaults
  name: AcademiX team
team_guidelines:
  cicd:
    - Run lint via next lint (extends next/core-web-vitals).
    - Ensure TypeScript compile/typecheck passes under strict mode.
    - Keep Node runtime compatibility aligned with repo requirement (Node 14.x per README.md).
    - 'Before merging: ensure Next.js build succeeds and Convex functions typecheck (convex/tsconfig.json strict).'
    - If GitHub Actions workflows are added, require checks to pass before merge.
  dependencies:
    - Use Convex React bindings (convex/react) and generated API imports (@/convex/_generated/api).
    - Use Clerk Next.js SDK for auth in frontend/middleware (@clerk/nextjs).
    - Use Stripe SDK only within server-side Convex actions where secrets are required (stripe secret key).
    - UI primitives should prefer Radix + shadcn patterns already present in components/ui/*.
    - Do not add a second auth provider; authentication remains Clerk.
    - Do not add a second database/persistence layer; persistence remains Convex tables/schema unless explicitly approved.
  general:
    - 'Follow Next.js App Router conventions: app/ for routes/layouts, components/ for shared UI, convex/ for backend functions.'
    - Treat Convex functions as the backend boundary; UI should call generated APIs (api.*) rather than duplicating data logic.
    - Keep business/data mutations in convex/; avoid embedding write logic in UI components beyond invoking mutations/actions.
    - Prefer small, composable React components; colocate route-specific components under app/**/_components when appropriate.
    - 'Follow repository-first governance: implement only what the codebase indicates is needed.'
    - Keep UI concerns in app/ and components/; keep data access and business rules in convex/.
    - Prefer server-side enforcement for access control; client-side checks are UX only.
  naming_formatting:
    - 'React components: PascalCase exports; files generally kebab-case or lowercase under components/.'
    - 'Convex functions: export const <name> = query|mutation|action(...) with clear verb naming (list/create/update/remove/add).'
    - Use TypeScript strict mode; keep types explicit at boundaries (Convex Id/Doc types).
    - Keep route segments under app/ aligned with Next.js App Router conventions.
  security:
    - All authenticated operations in convex/ must check ctx.auth.getUserIdentity() before accessing user-scoped data.
    - Use Convex indexes for user lookups (e.g., users.by_token, users.by_email) and never trust client-provided user identifiers.
    - Stripe webhooks must validate stripe-signature and STRIPE_WEBHOOK_SECRET before mutating state.
    - Do not widen public routes in middleware without explicit review; default is protect-all.
    - Never commit secrets; use environment variables for NEXT_STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, etc.
additional_context: "---\nFILE: .claude/CLAUDE.md\n---\n# Service Contract — k0renn/AcademiX\n\nYou are working inside a **strictly-scoped backend service**.\n\nTeam: AcademiX team\nBase policy: org-defaults\n\nCanonical service type: **Backend-for-Frontend (BFF)**  \nSource of truth: DATA.repoScan\n\n---\n\n## ✅ Owned Responsibilities\n\nYou MAY implement or modify code ONLY for the following responsibilities:\n\n### ✔ Next.js application routing, layouts, and UI rendering\nEvidence:\n- app/layout.tsx\n- app/(homepage)/page.tsx\n- app/[groupId]/page.tsx\n\n### ✔ Backend data model and business operations via Convex queries/mutations\nEvidence:\n- convex/schema.ts\n- convex/groups.ts\n- convex/posts.ts\n\n### ✔ Authentication integration and route protection using Clerk\nEvidence:\n- middleware.ts\n- providers/convex-client-provider.tsx\n- convex/auth.config.ts\n\n### ✔ Subscription checkout initiation and Stripe webhook fulfillment handling\nEvidence:\n- convex/stripe.ts\n- convex/http.ts\n- app/create/page.tsx\n\n### ✔ Web application UI routing and page composition (Next.js App Router)\nEvidence:\n- app/layout.tsx\n- app/(homepage)/page.tsx\n- app/[groupId]/page.tsx\n\n### ✔ BFF data access orchestration via Convex client hooks (queries/mutations/actions)\nEvidence:\n- app/(homepage)/page.tsx\n- app/[groupId]/page.tsx\n- hooks/use-api-mutation.ts\n\n### ✔ Domain data model, persistence, and business operations implemented as Convex queries/mutations\nEvidence:\n- convex/schema.ts\n- convex/posts.ts\n- convex/groups.ts\n\n### ✔ Identity-aware access checks at backend boundary using Convex auth context\nEvidence:\n- convex/users.ts\n- convex/comments.ts\n- convex/groups.ts\n\n### ✔ Payment session initiation for subscriptions and linking billing to group provisioning\nEvidence:\n- convex/stripe.ts\n- app/create/page.tsx\n- convex/groups.ts\n\n### ✔ Stripe webhook ingestion endpoint and fulfillment handling\nEvidence:\n- convex/http.ts\n- convex/stripe.ts\n\n---\n\n## ❌ Forbidden Responsibilities\n\nYou MUST NOT introduce code related to the following responsibilities.\nIf asked to do so — **refuse explicitly and explain why**, citing evidence.\n\n### ✖ Owning identity provider implementation (user auth, MFA, session issuance)\nEvidence:\n- middleware.ts\n- providers/convex-client-provider.tsx\n- convex/auth.config.ts\n\n### ✖ Owning payment processor or card vault (PCI storage/processing)\nEvidence:\n- convex/stripe.ts\n- convex/http.ts\n- app/create/page.tsx\n\n### ✖ Operating a standalone database or database server administration\nEvidence:\n- convex/schema.ts\n- convex/*.ts\n- package.json\n\n### ✖ Owning authentication (password storage, login UI beyond provider widgets, credential verification)\nEvidence:\n- middleware.ts\n- providers/convex-client-provider.tsx\n- package.json\n\n### ✖ Owning identity provider user directory and session management\nEvidence:\n- providers/convex-client-provider.tsx\n- components/navbar/index.tsx\n- package.json\n\n### ✖ Owning payment processing and PCI responsibilities outside Stripe (card data capture/storage)\nEvidence:\n- convex/stripe.ts\n- convex/http.ts\n- package.json\n\n### ✖ Owning core database infrastructure outside Convex (running/operating separate DB servers)\nEvidence:\n- convex/schema.ts\n- package.json\n- convex/README.md\n\n---\n\n## \U0001F4C2 Allowed Paths\n\nAll changes MUST be limited to the following paths:\n- app/**\n- components/**\n- providers/**\n- hooks/**\n- lib/**\n- convex/**\n- middleware.ts\n- package.json\n- package-lock.json\n- tsconfig.json\n- tailwind.config.ts\n- postcss.config.js\n- .eslintrc.json\n- components.json\n- README.md\n\n---\n\n## ⛔ Hard Prohibitions (Non-Negotiable)\n- Do not add custom credential storage, password handling, or session token minting; authentication is delegated to Clerk.\n- Do not store or log Stripe secrets, webhook secrets, or any API keys in the repository; use environment variables only (e.g., NEXT_STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET).\n- Do not bypass Stripe webhook signature verification for subscription fulfillment.\n- Do not implement direct database server management; data persistence is via Convex tables/schema only.\n- Do not add alternative auth providers or custom credential auth; authentication remains delegated to Clerk.\n- Do not process or store raw payment card data; payments remain delegated to Stripe.\n- Do not introduce a second persistence layer (SQL/NoSQL) without explicit governance approval; persistence remains in Convex tables.\n- Do not add unauthenticated state-changing Convex mutations/actions; all writes require ctx.auth.getUserIdentity().\n- Do not accept external webhooks without signature verification and strict parsing/bounds.\n\n---\n\n## \U0001F6E1 Enforcement Rules\n- All Convex mutations/actions that require a user must call ctx.auth.getUserIdentity() and fail if absent (pattern in convex/users.ts, convex/groups.ts, convex/posts.ts).\n- Inbound webhook routes must use stripe-signature header and STRIPE_WEBHOOK_SECRET verification before state changes (convex/http.ts -> internal.stripe.fulfill in convex/stripe.ts).\n- Route access is protected by default via Clerk authMiddleware matcher; changes require explicit review (middleware.ts).\n- Schema/table changes must be reflected only in convex/schema.ts and accessed via generated API bindings.\n- Convex boundary: all mutations/actions must validate inputs with convex/values and enforce auth via ctx.auth.getUserIdentity().\n- Webhook boundary: only expose routes via convex/http.ts; verify stripe-signature before processing.\n- Frontend boundary: do not reference server secrets in app/ or components/; use env vars only in server-side Convex actions.\n- Dependency boundary: new dependencies must be justified; keep lockfile updated and committed.\n\n---\n\n## \U0001F465 Team Coding Guidelines\n\n### General\n- Follow Next.js App Router conventions: app/ for routes/layouts, components/ for shared UI, convex/ for backend functions.\n- Treat Convex functions as the backend boundary; UI should call generated APIs (api.*) rather than duplicating data logic.\n- Keep business/data mutations in convex/; avoid embedding write logic in UI components beyond invoking mutations/actions.\n- Prefer small, composable React components; colocate route-specific components under app/**/_components when appropriate.\n- Follow repository-first governance: implement only what the codebase indicates is needed.\n- Keep UI concerns in app/ and components/; keep data access and business rules in convex/.\n- Prefer server-side enforcement for access control; client-side checks are UX only.\n\n### Naming & Formatting\n- React components: PascalCase exports; files generally kebab-case (e.g., components/about-side.tsx).\n- Convex functions: export const <name> = query|mutation|action(...) with clear verb naming (e.g., users.store, posts.updateContent).\n- Use TypeScript strict mode; keep types explicit at boundaries (Convex Id/Doc types).\n- React components: PascalCase exports; filename kebab-case or lowercase under components/.\n- Convex functions: verb-based exports (list/create/update/remove/add) and explicit validators via convex/values.\n- Keep route segments under app/ aligned with Next.js App Router conventions.\n\n### Dependencies\n- Use Convex React bindings (convex/react) and generated API imports (@/convex/_generated/api).\n- Use Clerk Next.js SDK for auth in frontend/middleware (@clerk/nextjs).\n- Use Stripe SDK only within server-side Convex actions where secrets are required (stripe secret key).\n- UI primitives should prefer Radix + shadcn patterns already present in components/ui/*.\n- Authentication/identity: use Clerk via @clerk/nextjs; do not add a second auth provider.\n- Backend/data: use Convex (queries/mutations/actions) for persistence; do not add a second database without explicit decision.\n- Payments: use Stripe via convex/stripe.ts; do not embed Stripe secret usage in the Next.js client.\n\n### Security\n- All authenticated operations in convex/ must check ctx.auth.getUserIdentity() before accessing user-scoped data.\n- Use Convex indexes for user lookups (e.g., users.by_token, users.by_email) and never trust client-provided user identifiers.\n- Stripe webhooks must validate stripe-signature and STRIPE_WEBHOOK_SECRET before mutating state.\n- Do not widen public routes in middleware without explicit review; default is protect-all.\n- Require ctx.auth.getUserIdentity() for any Convex mutation/action that changes state or reveals private data.\n- Verify Stripe webhook signatures; accept events only through Convex http router boundary.\n- Never commit secrets; use environment variables for NEXT_STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, etc.\n\n### CI/CD & Repo Hygiene\n- Run lint via next lint (extends next/core-web-vitals).\n- Ensure TypeScript compile/typecheck passes under strict mode.\n- Keep Node runtime compatibility aligned with repo requirement (documented Node 14.x).\n- Changes must keep next lint and TypeScript strict mode passing.\n- Before merging: ensure Next.js build succeeds and Convex functions typecheck (convex/tsconfig.json strict).\n- If GitHub Actions workflows are added, require checks to pass before merge.\n\n---\n\n## Final Rule\n\nIf a request:\n- Exceeds the service scope\n- Violates team guidelines\n- Introduces forbidden responsibilities\n\n**Refuse clearly, explain briefly, and cite evidence paths.**\n\n---\nFILE: .cursor/rules.md\n---\n# Cursor Rules — k0renn/AcademiX\n\n## Operating Constraints (Read First)\n- MUST align changes with the **Owned Responsibilities** below.\n- MUST NOT implement anything in **Forbidden Responsibilities**.\n- MUST obey **Enforcement**, **Allowed Paths**, and **Hard Prohibitions**.\n\n## Architecture (Source of Truth)\n- Source of truth: DATA.repoScan\n\n## Canonical Service Type (Choose Exactly One)\n- **Backend-for-Frontend (BFF)**\n\n## Owned Responsibilities (