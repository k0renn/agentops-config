ider.tsx\n   - Evidence: convex/auth.config.ts\n1. Owning payment processor or card vault (PCI storage/processing)\n   - Evidence: convex/stripe.ts\n   - Evidence: convex/http.ts\n   - Evidence: app/create/page.tsx\n1. Operating a standalone database or database server administration\n   - Evidence: convex/schema.ts\n   - Evidence: convex/*.ts\n   - Evidence: package.json\n1. Owning authentication (password storage, login UI beyond provider widgets, credential verification)\n   - Evidence: middleware.ts\n   - Evidence: providers/convex-client-provider.tsx\n   - Evidence: package.json\n1. Owning identity provider user directory and session management\n   - Evidence: providers/convex-client-provider.tsx\n   - Evidence: components/navbar/index.tsx\n   - Evidence: package.json\n1. Owning payment processing and PCI responsibilities outside Stripe (card data capture/storage)\n   - Evidence: convex/stripe.ts\n   - Evidence: convex/http.ts\n   - Evidence: package.json\n1. Owning core database infrastructure outside Convex (running/operating separate DB servers)\n   - Evidence: convex/schema.ts\n   - Evidence: package.json\n   - Evidence: convex/README.md\n\n## Enforcement (Mandatory)\n- MUST: All Convex mutations/actions that require a user must call ctx.auth.getUserIdentity() and fail if absent (pattern in convex/users.ts, convex/groups.ts, convex/posts.ts).\n- MUST: Inbound webhook routes must use stripe-signature header and STRIPE_WEBHOOK_SECRET verification before state changes (convex/http.ts -> internal.stripe.fulfill in convex/stripe.ts).\n- MUST: Route access is protected by default via Clerk authMiddleware matcher; changes require explicit review (middleware.ts).\n- MUST: Schema/table changes must be reflected only in convex/schema.ts and accessed via generated API bindings.\n- MUST: Convex boundary: all mutations/actions must validate inputs with convex/values and enforce auth via ctx.auth.getUserIdentity().\n- MUST: Webhook boundary: only expose routes via convex